<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

 <div id="bg-animation"></div>

    <div class="calc-container">
        <input type="text" id="display" class="screen" placeholder="0" readonly>
        
        <div class="buttons-grid">
            <button class="btn-calc clear" onclick="clearDisplay()">AC</button>
            <button class="btn-calc operator" onclick="deleteChar()">C</button>
            <button class="btn-calc operator" onclick="append('%')">%</button>
            <button class="btn-calc operator" onclick="append('/')">/</button>
            
            <button class="btn-calc" onclick="append('7')">7</button>
            <button class="btn-calc" onclick="append('8')">8</button>
            <button class="btn-calc" onclick="append('9')">9</button>
            <button class="btn-calc operator" onclick="append('*')">×</button>
            
            <button class="btn-calc" onclick="append('4')">4</button>
            <button class="btn-calc" onclick="append('5')">5</button>
            <button class="btn-calc" onclick="append('6')">6</button>
            <button class="btn-calc operator" onclick="append('-')">-</button>
            
            <button class="btn-calc" onclick="append('1')">1</button>
            <button class="btn-calc" onclick="append('2')">2</button>
            <button class="btn-calc" onclick="append('3')">3</button>
            <button class="btn-calc operator" onclick="append('+')">+</button>
            
            <button class="btn-calc" onclick="append('0')">0</button>
            <button class="btn-calc" onclick="append('.')">.</button>
            <button class="btn-calc equal" onclick="calculate()">=</button>
        </div>
    </div>


</body>
<script src="script.js"></script>
</html>
